source = ~/.cache/wal/colors-hyprland.conf
# source = ~/.cache/wal/hypr-accent.conf

# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,preferred,auto,1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$wbr = ~/scripts/waybarrefresh.sh 
$terminal = kitty
$terminalalt = alacritty 
$fileManager = nautilus 
$menu = krunner 
$browser1 = ~/scripts/zen-single-instance.sh
$browser2 = microsoft-edge-stable 
$browser3 = firefox 
$menualt = ~/scripts/rofi_toggle.sh
#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

 exec-once = hyprlock
 exec-once = ~/.config/hypr/autostart.sh
 exec-once = kdeconnectd & kdeconnect-indicator
 exec-once = nm-applet &
 exec-once = waybar & swaync & hypridle & flameshot & hyprsunset & swayosd-server & squeekboard
 exec-once = hyprctl setcursor Nordzy 29
 exec-once = copyq --start-server
 exec-once = bash ~/scripts/battery_alert.sh
 exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
 exec-once = swww-daemon & swww $wallpaper
 exec-once = mpd ~/.config/mpd/mpd.conf
 
 exec-once = gnome-keyring-daemon --start --components=pkcs11,secrets,ssh
 exec-once = hyprscratch init clean eager spotless
 exec-once = hyprscratch sleek sleek spotless & ~/rmpc/toggle_rmpc.sh & hyprscratch "KDE Connect" kdeconnect-app
 exec-once = qs -p .config/quickshell/quickshell-examples-master/activate_linux/ -d && qs -p ~/.config/quickshell/clock/shell.qml -d && ~/scripts/brightness.sh 0
#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = SSH_AUTH_SOCK $XDG_RUNTIME_DIR/keyring/ssh
#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 3 
    gaps_out = 6

    border_size =1 

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $foreground
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 5

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 2
	noise = 0.08
	ignore_opacity = true
	contrast = 2
        vibrancy = 0.1696
    }
}

source = ~/.config/hypr/keybinds/animation.config

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]

windowrule = match:class ocr-editor, float on, move 1162 357, size 742 704, opacity 0.75 0.75
windowrule = match:class transcribe, float on, move 676 642, size 626 235, opacity 0.75 0.75

# ────────── sleek ──────────
windowrule = match:class sleek, float on
windowrule = match:class sleek, size 538 1035
windowrule = match:class sleek, move 1370 33
windowrule = match:class sleek, opacity 0.75 0.75

windowrule = match:class org.pwmt.zathura, opacity 0.95 0.95

# ────────── flameshot ──────────
windowrule = match:class flameshot, float on
windowrule = match:class flameshot, opacity 1.0 1.0
windowrule = match:class flameshot, animation fade

# ────────── onboard ──────────
windowrule = match:class onboard, float on
windowrule = match:class onboard, size 444 300
windowrule = match:class onboard, move 1370 533
windowrule = match:class onboard, opacity 0.75 0.75

# ────────── KDE Connect ──────────
windowrule = match:class org.kde.kdeconnect.app, float on
windowrule = match:class org.kde.kdeconnect.app, size 400 400
windowrule = match:class org.kde.kdeconnect.app, move 1510 33
windowrule = match:class org.kde.kdeconnect.app, opacity 0.75 0.75


# ────────── CopyQ ──────────
windowrule = match:class com.github.hluk.copyq, float on
windowrule = match:class com.github.hluk.copyq, move 1210 270
windowrule = match:class com.github.hluk.copyq, size 700 800
windowrule = match:class com.github.hluk.copyq, border_size 1, rounding 2
windowrule = match:class com.github.hluk.copyq, opacity 0.75 0.80

# ────────── qalculate-gtk ──────────
windowrule = match:class qalculate-gtk, float on
windowrule = match:class qalculate-gtk, size 513 773
windowrule = match:class qalculate-gtk, border_size 1, rounding 2
windowrule = match:class qalculate-gtk, opacity 0.75 0.80

# ────────── rmpc ──────────
windowrule = match:class rmpc, size 1721 504, move 98 563

# ────────── fzf ──────────
windowrule = match:class fuzzymusic, float on, size 683 365, move 618 701
windowrule = match:class fzfscripts, float on, size 683 365, move 618 701
windowrule = match:class fzftodoadd, float on, size 683 565, move 618 501


# ────────── feh ──────────
windowrule = match:class feh, float on

# ────────── rlr (bar-like window) ──────────
windowrule = match:class rlr, float on
windowrule = match:class rlr, move 0 0
windowrule = match:class rlr, size 1920 100


# ────────── wvkbd ──────────
windowrule = match:title wvkbd-mobintl, float on


# ────────── Zen browser ──────────
windowrule = match:class zen, workspace 2


# ────────── Google Sign-in popups ──────────
windowrule = match:title ^(.*Sign in - Google Accounts.*)$, float on
windowrule = match:title ^(.*Sign in - Google Accounts.*)$, size 600 900


# ────────── Picture-in-Picture ──────────
windowrule = match:title Picture-in-Picture, float on
windowrule = match:title Picture-in-Picture, size 900 506


# ────────── Pavucontrol ──────────
windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = match:class org.pulseaudio.pavucontrol, size 538 1035
windowrule = match:class org.pulseaudio.pavucontrol, move 1370 33
windowrule = match:class org.pulseaudio.pavucontrol, opacity 0.75 0.75


# ────────── Microsoft Edge ──────────
windowrule = match:class microsoft-edge, workspace 3
windowrule = match:class microsoft-edge, opacity 0.95 0.95


# ────────── Nautilus ──────────
windowrule = match:class org.gnome.Nautilus, opacity 0.85 0.85


# ────────── Amberol ──────────
windowrule = match:class io.bassi.Amberol, opacity 0.85 0.85

layerrule {
  name = hyprpicker_fade
  match:namespace = hyprpicker

  animation = fade
}


# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    kb_options = caps:swapescape

    follow_mouse = 1

    sensitivity = 0.333333333333333333333333333333333 # -1.0 - 1.0, 0 means no modification.

    touchpad {
    	natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
#	gesture = 4, horizontal, workspace
#	gesture = 3, down, dispatcher, exec, wtype -M ctrl c -m ctrl
#	gesture = 3, up, dispatcher, exec, wtype -M ctrl v -m ctrl
#	gesture = 4, pinch, dispatcher, exec, wtype -M ctrl a -m ctrl
	gesture = 4, right, dispatcher, exec, ~/scripts/workspace_change.sh L4 && $wbr 
	gesture = 4, left, dispatcher, exec, ~/scripts/workspace_change.sh R4 && $wbr 
	gesture = 3, right, dispatcher, exec, ~/scripts/workspace_change.sh L && $wbr 
	gesture = 3, left, dispatcher, exec, ~/scripts/workspace_change.sh R && $wbr 
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bindu = $mainMod, Q, exec, $terminal & $wbr
bindu = $mainMod SHIFT, Q, exec, $terminalalt && $wbr
bindu = $mainMod SHIFT, C, killactive
bindu = $mainMod SHIFT, C, exec, $wbr
bindu = $mainMod, C, exec, ~/scripts/prevent_zen_closing.sh
#bind = $mainMod, M, exit,
bind = $mainMod SHIFT, P, exec, ~/scripts/ocr.sh 
bind = $mainMod, S, exec, $fileManager && $wbr
bind = $mainMod SHIFT, S, exec, kitty -e yazi && $wbr 
bind = $mainMod, F, togglefloating,
bindu = $mainMod, R, exec, wtype e 
bindu = $mainMod SHIFT, R, exec, wtype E 
bind = $mainMod, SPACE, exec, $menualt && $wbr
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, Y, togglesplit, # dwindle
bindu = $mainMod, X, exec, kitty -e nvim && $wbr
bindu = ALT, grave , exec, pkill rofi & ~/.config/rofi/powermenu/powermenu.sh && $wbr
bindu = $mainMod, A, exec, ~/scripts/rofi-wifi-menu/rofi-wifi-menu.sh && $wbr

# custom binds
bind = SUPER, K, exec, ~/scripts/squeekboard.sh && $wbr
bind = ALT, mouse:275, exec, ~/scripts/squeekboard.sh && $wbr
bind = ALT, mouse:274, workspace, e-1
bindu = $mainMod, B, exec, $browser1 && $wbr
bindu = $mainMod ALT, B, exec, $browser3 && $wbr
bindu = $mainMod SHIFT, B, exec, $browser2 && $wbr 
bindu = $mainMod SHIFT, L, exec, hyprlock && $wbr
bind = , PRINT, exec, flameshot gui
bind = ALT, PRINT, exec, flameshot gui -p ~/vimwiki/assets/ 
bind = $mainMod, PRINT, exec, ~/scripts/send_screenshot.sh
bind = $mainMod, f8, exec, ~/scripts/display-rotate.sh
bind = $mainMod SHIFT, PRINT, exec, ~/scripts/send_entire_screenshot.sh
bindu = , Menu, exec, pkill tts ; ~/scripts/tts.sh
bind = $mainMod SHIFT, T, exec, hyprpicker -a
bind = $mainMod, V, exec, copyq show && hyprctl dispatch movecursor 1670 830
bind = $mainMod, T, exec, ~/scripts/toss.sh
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod, H, exec, hyprctl dispatch killwindow class:transcribe && kitty --hold --class "transcribe" -e bash -c '~/scripts/transcribe.sh' && $wbr
bindu = $mainMod, Z, exec, hyprctl dispatch killwindow class:fzfscripts && kitty --class "fzfscripts" -e ~/scripts/fzfscripts.sh && $wbr
bindu = CTRL, grave , exec, hyprctl dispatch killwindow class:fzftodoadd && kitty --class "fzftodoadd" -e ~/scripts/todoadd.sh && $wbr
# --------- SUBMAP: CONFIG MODE -----------
# Enter config mode
bind = $mainMod, O, submap, Config

submap = Config

    #BASIC
    source = ~/.config/hypr/keybinds/rmpc_numpad.config

    # Reload waybar
    bind = $mainMod SHIFT, S, exec, pgrep waybar && pkill waybar && hyprctl dispatch exec waybar || hyprctl dispatch exec waybar && sleep 1 && hyprctl dispatch submap Config

    # Edit Hyprland config
    bind = $mainMod, H, exec, kitty nvim /home/riwxr/.config/hypr/hyprland.conf & sleep .2 && $wbr

    # Restart Waybar 
    bind = $mainMod, S, exec, kitty nvim /home/riwxr/.config/waybar/config & sleep .2 && $wbr

    # Exit submap 
    bind = $mainMod , O, submap, reset

 submap = reset


source = ~/.config/hypr/keybinds/rmpc_numpad.config
source = ~/.config/hypr/keybinds/navigation.config

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
source = ~/.config/hypr/noctalia/noctalia-colors.conf

