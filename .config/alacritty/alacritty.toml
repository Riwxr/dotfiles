[env]
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1"

[window]
padding = {x=15, y=15}
decorations = "full"
title = "Alacritty@riwxr"
opacity = 0.70
blur = true
decorations_theme_variant = "Dark"

[window.dimensions]
columns = 100
lines = 30

[window.class]
instance = "Alacritty"
general = "Alacritty"

[scrolling]
history = 10000
multiplier = 3


[general]
live_config_reload = true
working_directory = "None"

import = [
  "./catppuccin-mocha.toml"
]

[font]
size = 13.0

[colors]
draw_bold_text_with_bright_colors = true

[font.bold]
family = "IosevkaTermSlab Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "IosevkaTermSlab Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "IosevkaTermSlab Nerd Font Mono"
style = "Italic"

[font.normal]
family = "IosevkaTermSlab Nerd Font Mono"
style = "SemiBold"

[[keyboard.bindings]]
key = "C"
mods = "Control"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Alt"
chars = "\u0003"



