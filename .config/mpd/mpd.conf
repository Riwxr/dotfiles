music_directory          "~/Music"
playlist_directory       "~/.mpd/playlists"
db_file                  "~/.mpd/database"
log_file                 "~/.mpd/log"
pid_file                 "~/.mpd/pid"
state_file               "~/.mpd/state"

auto_update              "yes"

bind_to_address          "127.0.0.1"
port                     "6600"

# PipeWire / ALSA output — works on Arch (Hyprland)
audio_output {
    type    "pipewire"
    name    "PipeWire Output"
}

